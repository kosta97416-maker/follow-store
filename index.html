<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Trend | L'Empire du Drop</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: var(--gold); font-size: 2.5em; text-transform: uppercase; letter-spacing: 3px; }
        
        /* Grille de produits */
        #products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Carte Produit */
        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .product-card img { width: 100%; border-radius: 5px; height: 200px; object-fit: cover; }
        .product-card h3 { font-size: 14px; height: 40px; overflow: hidden; margin: 10px 0; color: #ccc; }
        .product-card .price { color: var(--gold); font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
        
        .buy-btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        .loader { color: var(--gold); font-style: italic; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>Follow Trend Empire</h1>
    <p>Sélection automatique par Intelligence Artificielle</p>

    <div id="products-container">
        <p class="loader">L'agent Hunter scanne AliExpress pour vous...</p>
    </div>

    <script>
        async function loadEmpire() {
            const container = document.getElementById('products-container');
            try {
                // Appel au serveur (server.js)
                const response = await fetch('/?action=search');
                const data = await response.json();

                if (data.success && data.products && data.products.length > 0) {
                    container.innerHTML = data.products.map(p => `
                        <div class="product-card">
                            <img src="${p.image}" alt="Produit">
                            <h3>${p.name}</h3>
                            <p class="price">${p.price}€</p>
                            <a href="${p.link}" target="_blank" class="buy-btn">Acheter maintenant</a>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "<p>Aucun produit trouvé. Vérifiez les logs de Render.</p>";
                }
            } catch (error) {
                console.error("Erreur de connexion :", error);
                container.innerHTML = "<p style='color:red;'>Erreur de connexion au Hub Central.</p>";
            }
        }

        // Lancement automatique au chargement de la page
        window.onload = loadEmpire;
    </script>
</body>
</html>
