<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW. — Centre Opérationnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C8FF00; --bg: #050505; --card: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
       
        /* BARRE DE NAVIGATION CEO */
        .nav-ceo { background: #000; padding: 10px; display: flex; justify-content: flex-end; border-bottom: 1px solid #222; }
        .nav-ceo a { color: #555; font-size: 10px; text-decoration: none; border: 1px solid #333; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .nav-ceo a:hover { border-color: var(--accent); color: var(--accent); }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 60px; letter-spacing: 2px; margin-bottom: 10px; }
        h1 span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .niche-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .niche-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .btn-gen { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        #output { margin-top: 30px; background: #000; padding: 20px; border-radius: 10px; border: 1px dashed var(--accent); display: none; text-align: left; }
        .link-box { background: #1a1a1a; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 12px; color: var(--accent); word-break: break-all; }
    </style>
</head>
<body>

    <div class="nav-ceo">
        <a href="dashboard.html">💼 ACCÈS BUREAU CEO (PRIVE)</a>
    </div>

    <div class="container">
        <h1>FOLLOW<span>.</span> OPS</h1>
        <p style="color: #666; letter-spacing: 2px; font-size: 12px;">SÉLECTIONNEZ UNE NICHE D'INFILTRATION</p>

        <div class="grid">
            <div class="niche-card" onclick="selectNiche('eau', 'SYSTÈME DE FILTRATION MILITAIRE')">💧 EAU</div>
            <div class="niche-card" onclick="selectNiche('energie', 'AUTONOMIE ÉNERGÉTIQUE')">⚡ ÉNERGIE</div>
            <div class="niche-card" onclick="selectNiche('soin', 'SOIN DU DOS TACTIQUE')">🧘 SOIN</div>
            <div class="niche-card" onclick="selectNiche('survie', 'ÉQUIPEMENT DE SURVIE 72H')">🎒 SURVIE</div>
        </div>

        <div id="output">
            <div style="font-size: 12px; color: var(--accent); margin-bottom: 10px;">MUNITION GÉNÉRÉE :</div>
            <div id="script-text" style="font-size: 14px; line-height: 1.4;"></div>
            <div class="link-box" id="link-text"></div>
            <button class="btn-gen" onclick="copyLink()">COPIER LE LIEN AGENT</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION LIAISON CUISINE (RENDER STARTER) ---
        const RENDER_API = "https://ton-service-render.onrender.com"; // <-- REMPLACE PAR TON LIEN RENDER
        
        let currentLink = "";

        // Nouvelle fonction pour envoyer l'info à Render sans bloquer l'interface
        async function syncCuisine(nicheId) {
            try {
                await fetch(`${RENDER_API}/api/log-niche`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ niche: nicheId, timestamp: new Date() })
                });
            } catch (e) {
                console.log("Cuisine en préparation...");
            }
        }

        function selectNiche(id, name) {
            const output = document.getElementById('output');
            const script = document.getElementById('script-text');
            const linkDisplay = document.getElementById('link-text');
           
            output.style.display = "block";
            script.innerHTML = "<strong>Cible :</strong> " + name + "<br><strong>Stratégie :</strong> Infiltration via contenu viral. <br><br><em>Utilisez le lien ci-dessous pour diriger le trafic vers la page de capture.</em>";
           
            currentLink = window.location.href.replace('index.html', '') + "target.html?p=" + id;
            linkDisplay.innerText = currentLink;

            // Appel de la liaison Render
            syncCuisine(id);
        }

        function copyLink() {
            navigator.clipboard.writeText(currentLink);
            alert("Lien copié ! Envoie-le sur les réseaux.");
        }
    </script>
</body>
</html>
