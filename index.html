<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --amazon: #FF9900; --ai: #00F0FF; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* HEADER REVENUS RÉELS */
        .revenue-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; }
        .rev-val { font-size: 22px; font-weight: bold; display: block; }
        .rev-label { font-size: 9px; letter-spacing: 2px; color: #555; margin-top: 5px; text-transform: uppercase; }
        .shopify { color: var(--neon); }
        .amazon { color: var(--amazon); }
        .ai-aff { color: var(--ai); }

        /* ZONE CENTRALE : ORDRES & MUNITIONS */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; height: calc(100vh - 85px); }
        .module { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .module-header { font-size: 10px; color: var(--neon); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px; }

        /* INPUTS */
        textarea, input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; font-family: 'Space Mono'; margin-bottom: 15px; outline: none; }
        textarea { flex: 1; resize: none; border-color: #333; font-size: 11px; color: #888; }
        textarea:focus { border-color: var(--neon); color: var(--neon); }

        /* BOUTONS */
        .btn { padding: 18px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-order { background: var(--neon); color: #000; font-weight: bold; }
        .btn-order:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }
        .btn-catalog { background: #111; color: #fff; border: 1px solid #222; margin-top: 10px; }

        /* OVERLAY INVENTAIRE */
        #inventory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 40px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 80vh; margin-top: 20px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        .col-title { color: var(--neon); font-size: 11px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #ff4444; cursor: pointer; font-size: 10px; border: 1px solid #ff4444; padding: 5px 10px; }
        .prod-card { background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; cursor: pointer; font-size: 10px; }
        .prod-card:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div class="revenue-header">
        <div class="rev-card"><span class="rev-val shopify" id="shop-total">0.00€</span><span class="rev-label">SHOPIFY LIVE</span></div>
        <div class="rev-card"><span class="rev-val amazon" id="amz-total">0.00€</span><span class="rev-label">AMAZON LIVE</span></div>
        <div class="rev-card"><span class="rev-val ai-aff" id="ai-total">0.00€</span><span class="rev-label">AI_AGENT LIVE</span></div>
    </div>

    <div class="main-grid">
        <div class="module">
            <div class="module-header">ENVOYER_ORDRE_AUX_AGENTS (HTML/SCRIPT)</div>
            <textarea id="order-html" placeholder="Coller ici le code HTML ou les instructions pour les agents..."></textarea>
            <button class="btn btn-order" onclick="deployOrder()">DÉPLOYER L'ORDRE</button>
        </div>

        <div class="module">
            <div class="module-header">GÉNÉRATEUR_DE_MUNITION</div>
            <div style="font-size: 10px; color: #444; margin-bottom: 5px;">LIEN AGENT CIBLE :</div>
            <input type="text" id="current-url" value="En attente de sélection...">
            <button class="btn btn-order" style="background:#fff;" onclick="copyLink()">COPIER LA MUNITION</button>
            <button class="btn btn-catalog" onclick="openInventory()">📦 ACCÉDER À L'INVENTAIRE</button>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="close-btn" onclick="closeInventory()">[ FERMER ]</div>
        <div style="font-family: 'Syncopate'; font-size: 18px;">INVENTAIRE_UNITÉS</div>
        <div class="inventory-grid">
            <div class="col"><div class="col-title">💧 EAU</div><div class="prod-card" onclick="setNiche('eau')">UNITÉ_FILTRATION_01</div></div>
            <div class="col"><div class="col-title">⚡ ÉNERGIE</div><div class="prod-card" onclick="setNiche('energie')">PANNEAU_NOMADE_01</div></div>
            <div class="col"><div class="col-title">🧘 SOIN</div><div class="prod-card" onclick="setNiche('soin')">CORRECTEUR_POSTURE_01</div></div>
            <div class="col"><div class="col-title">🎒 SURVIE</div><div class="prod-card" onclick="setNiche('survie')">KIT_TACTIQUE_72H</div></div>
        </div>
    </div>

    <script>
        const RENDER_API = "https://ton-service-render.onrender.com"; 

        function openInventory() { document.getElementById('inventory-overlay').style.display = 'block'; }
        function closeInventory() { document.getElementById('inventory-overlay').style.display = 'none'; }

        function setNiche(id) {
            document.getElementById('current-url').value = window.location.origin + "/target.html?p=" + id;
            closeInventory();
        }

        async function copyLink() {
            const input = document.getElementById("current-url");
            await navigator.clipboard.writeText(input.value);
            alert("Munition copiée.");
        }

        // FONCTION D'ENVOI D'ORDRE (ENVOIE L'HTML A RENDER)
        async function deployOrder() {
            const htmlContent = document.getElementById('order-html').value;
            if(!htmlContent) return alert("Zone d'ordre vide.");
            
            try {
                const res = await fetch(`${RENDER_API}/api/deploy-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ html: htmlContent, timestamp: new Date() })
                });
                if(res.ok) alert("ORDRE DÉPLOYÉ AVEC SUCCÈS.");
            } catch (e) {
                alert("ERREUR : Cuisine Render non connectée.");
            }
        }
    </script>
</body>
</html>
