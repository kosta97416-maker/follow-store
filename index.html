<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW. HQ — CATALOGUE TACTIQUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #050505; --panel: #111; --border: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* ÉCRAN PRINCIPAL */
        .main-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn-open-catalog { background: none; border: 2px solid var(--neon); color: var(--neon); padding: 25px 50px; font-family: 'Syncopate', sans-serif; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(200, 255, 0, 0.2); }
        .btn-open-catalog:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        /* ÉCRAN PRODUITS (CACHE PAR DÉFAUT) */
        #catalog-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 40px; box-sizing: border-box; }
        .header-catalog { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .btn-close { color: #555; cursor: pointer; font-size: 12px; text-decoration: underline; }

        /* LES 4 COLONNES */
        .catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; height: calc(100% - 120px); }
        .column { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .column-title { font-family: 'Syncopate', sans-serif; color: var(--neon); font-size: 14px; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* CARTES PRODUITS DANS LES COLONNES */
        .product-item { background: #000; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .product-item:hover { border-color: var(--neon); }
        .product-item img { width: 100%; height: 100px; object-fit: cover; filter: grayscale(100%); margin-bottom: 10px; }
        .product-item:hover img { filter: grayscale(0%); }
        .product-name { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .product-price { color: var(--neon); font-size: 11px; }

        /* SCROLLBAR STYLE */
        .column::-webkit-scrollbar { width: 3px; }
        .column::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <div class="main-view">
        <h1 style="font-family: 'Syncopate', sans-serif; margin-bottom: 40px; letter-spacing: -2px;">FOLLOW_HQ<span>.</span></h1>
        <button class="btn-open-catalog" onclick="toggleCatalog(true)">DÉPLOYER L'INVENTAIRE</button>
    </div>

    <div id="catalog-overlay">
        <div class="header-catalog">
            <div style="font-family: 'Syncopate', sans-serif; font-size: 20px;">INVENTAIRE_TACTIQUE</div>
            <div class="btn-close" onclick="toggleCatalog(false)">[ RETOUR AU POSTE DE COMMANDE ]</div>
        </div>

        <div class="catalog-grid">
            <div class="column">
                <div class="column-title">💧 EAU</div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">FILTRE_MILITAIRE_V1</div>
                    <div class="product-price">49.99€</div>
                </div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">PASTILLES_PURIF_X100</div>
                    <div class="product-price">19.99€</div>
                </div>
            </div>

            <div class="column">
                <div class="column-title">⚡ ÉNERGIE</div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">PANNEAU_SOLAIRE_NOMADE</div>
                    <div class="product-price">129.99€</div>
                </div>
            </div>

            <div class="column">
                <div class="column-title">🧘 SOIN</div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">CEINTURE_LOMBAIRE_PRO</div>
                    <div class="product-price">34.99€</div>
                </div>
            </div>

            <div class="column">
                <div class="column-title">🎒 SURVIE</div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">SAC_72H_TACTIQUE</div>
                    <div class="product-price">89.99€</div>
                </div>
                <div class="product-item">
                    <img src="https://via.placeholder.com/150" alt="Prod">
                    <div class="product-name">KIT_FEU_MAGNÉSIUM</div>
                    <div class="product-price">14.99€</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleCatalog(show) {
            document.getElementById('catalog-overlay').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
