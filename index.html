<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --amazon: #FF9900; --ai: #00F0FF; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* HEADER REVENUS */
        .revenue-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; }
        .rev-val { font-size: 22px; font-weight: bold; display: block; }
        .rev-label { font-size: 9px; letter-spacing: 2px; color: #555; margin-top: 5px; text-transform: uppercase; }

        /* MAIN LAYOUT */
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; padding: 20px; height: calc(100vh - 85px); }
        .module { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .module-header { font-size: 10px; color: var(--neon); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px; }

        /* INPUTS & TEXT */
        textarea { flex: 1; background: #000; border: 1px solid #222; color: #fff; padding: 15px; font-family: 'Space Mono'; font-size: 11px; margin-bottom: 15px; resize: none; outline: none; }
        textarea:focus { border-color: var(--neon); }
        .url-display { background: #000; border: 1px solid #222; padding: 15px; color: var(--neon); font-size: 12px; margin-bottom: 15px; overflow: hidden; text-overflow: ellipsis; }

        /* BOUTONS */
        .btn { padding: 20px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: none; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        .btn-deploy { background: var(--neon); color: #000; }
        .btn-deploy:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }
        .btn-catalog { background: #111; color: #fff; border: 1px solid #222; margin-top: 10px; }

        /* OVERLAY INVENTAIRE */
        #inventory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 40px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 80vh; margin-top: 20px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        .col-title { color: var(--neon); font-size: 11px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #ff4444; cursor: pointer; font-size: 10px; border: 1px solid #ff4444; padding: 5px 10px; }
        .prod-card { background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; cursor: pointer; font-size: 10px; }
        .prod-card:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div class="revenue-header">
        <div class="rev-card"><span class="rev-val" style="color:var(--neon)">0.00€</span><span class="rev-label">SHOPIFY LIVE</span></div>
        <div class="rev-card"><span class="rev-val" style="color:var(--amazon)">0.00€</span><span class="rev-label">AMAZON LIVE</span></div>
        <div class="rev-card"><span class="rev-val" style="color:var(--ai)">0.00€</span><span class="rev-label">AI_AGENT LIVE</span></div>
    </div>

    <div class="main-grid">
        <div class="module">
            <div class="module-header">COMMANDE_TACTIQUE (HTML/SCRIPT)</div>
            <textarea id="order-box" placeholder="Collez le code pour vos agents ici..."></textarea>
            <button class="btn btn-deploy" onclick="deployToCuisine()">DÉPLOYER L'ORDRE AUX AGENTS</button>
        </div>

        <div class="module">
            <div class="module-header">MUNITION_ACTUELLE</div>
            <div class="url-display" id="url-text">AUCUN PRODUIT SÉLECTIONNÉ</div>
            <button class="btn btn-deploy" style="background:#fff" onclick="copyUrl()">COPIER LA MUNITION</button>
            <button class="btn btn-catalog" onclick="openInv()">📦 INVENTAIRE PRODUITS</button>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="close-btn" onclick="closeInv()">[ FERMER ]</div>
        <div class="inventory-grid">
            <div class="col"><div class="col-title">💧 EAU</div><div class="prod-card" onclick="selectProd('eau')">FILTRE_V1</div></div>
            <div class="col"><div class="col-title">⚡ ENERGIE</div><div class="prod-card" onclick="selectProd('energie')">SOLAR_V1</div></div>
            <div class="col"><div class="col-title">🧘 SOIN</div><div class="prod-card" onclick="selectProd('soin')">BIO_BACK_V1</div></div>
            <div class="col"><div class="col-title">🎒 SURVIE</div><div class="prod-card" onclick="selectProd('survie')">KIT_72H_V1</div></div>
        </div>
    </div>

    <script>
        const RENDER_API = "https://ton-service-render.onrender.com"; // REMPLACE PAR TON URL RENDER

        function openInv() { document.getElementById('inventory-overlay').style.display = 'block'; }
        function closeInv() { document.getElementById('inventory-overlay').style.display = 'none'; }
        
        function selectProd(niche) {
            const link = window.location.origin + "/target.html?p=" + niche;
            document.getElementById('url-text').innerText = link;
            closeInv();
        }

        function copyUrl() {
            const t = document.getElementById('url-text').innerText;
            navigator.clipboard.writeText(t);
            alert("Munition prête.");
        }

        async function deployToCuisine() {
            const code = document.getElementById('order-box').value;
            if(!code) return alert("Zone vide.");
            
            // Sécurisation du transfert (Base64)
            const encoded = btoa(encodeURIComponent(code));

            try {
                const res = await fetch(`${RENDER_API}/api/deploy`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ order: encoded, auth: "CEO_FOLLOW" })
                });
                if(res.ok) alert("DÉPLOIEMENT RÉUSSI.");
                else alert("ERREUR SERVEUR.");
            } catch (e) { alert("ERREUR LIAISON RENDER."); }
        }
    </script>
</body>
</html>
