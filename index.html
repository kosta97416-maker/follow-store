<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --amazon: #FF9900; --ai: #00F0FF; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* HEADER REVENUS */
        .revenue-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; }
        .rev-val { font-size: 22px; font-weight: bold; display: block; }
        .rev-label { font-size: 9px; letter-spacing: 2px; color: #555; margin-top: 5px; }
        .shopify { color: var(--neon); }
        .amazon { color: var(--amazon); }
        .ai-aff { color: var(--ai); }

        /* DASHBOARD CENTRAL */
        .main-container { height: calc(100vh - 85px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .url-box { width: 100%; max-width: 700px; background: var(--panel); border: 1px solid var(--border); padding: 30px; position: relative; }
        .url-input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: var(--neon); font-family: 'Space Mono'; margin-top: 10px; }
        
        .action-btns { display: flex; gap: 10px; width: 100%; max-width: 700px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: 1px solid var(--border); transition: 0.3s; }
        .btn-catalog { background: var(--neon); color: #000; font-weight: bold; }
        .btn-copy { background: #000; color: #fff; }

        /* INVENTAIRE OVERLAY */
        #inventory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 30px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 85vh; margin-top: 20px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        .col-title { color: var(--neon); font-size: 12px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #ff4444; cursor: pointer; font-size: 10px; border: 1px solid #ff4444; padding: 5px 10px; }

        /* ITEM PRODUIT */
        .prod { background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; font-size: 11px; cursor: pointer; }
        .prod:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div class="revenue-header">
        <div class="rev-card"><span class="rev-val shopify" id="shop-total">0.00€</span><span class="rev-label">SHOPIFY OPS</span></div>
        <div class="rev-card"><span class="rev-val amazon" id="amz-total">0.00€</span><span class="rev-label">AMAZON AFFILIATION</span></div>
        <div class="rev-card"><span class="rev-val ai-aff" id="ai-total">0.00€</span><span class="rev-label">AI_AGENT COMMISSIONS</span></div>
    </div>

    <div class="main-container">
        <div class="url-box">
            <div style="font-size: 10px; color: #555;">[ MUNITION_ACTUELLE ]</div>
            <input type="text" class="url-input" id="current-url" value="Chargement du lien...">
        </div>
        <div class="action-btns">
            <button class="btn btn-catalog" onclick="openInventory()">📦 OUVRIR INVENTAIRE PRODUITS</button>
            <button class="btn btn-copy" onclick="copyLink()">COPIER LE LIEN AGENT</button>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="close-btn" onclick="closeInventory()">[ FERMER X ]</div>
        <div style="font-family: 'Syncopate'; font-size: 18px; margin-bottom: 20px;">INVENTAIRE_PARCOURS</div>
        <div class="inventory-grid">
            <div class="col" id="col-eau"><div class="col-title">💧 EAU</div></div>
            <div class="col" id="col-energie"><div class="col-title">⚡ ÉNERGIE</div></div>
            <div class="col" id="col-soin"><div class="col-title">🧘 SOIN</div></div>
            <div class="col" id="col-survie"><div class="col-title">🎒 SURVIE</div></div>
        </div>
    </div>

    <script>
        // CONFIGURATION SÉCURISÉE RENDER
        const RENDER_API = "https://ton-service-render.onrender.com"; 

        function openInventory() { document.getElementById('inventory-overlay').style.display = 'block'; }
        function closeInventory() { document.getElementById('inventory-overlay').style.display = 'none'; }

        // SYNC AVEC LA CUISINE
        async function syncCuisine(action, details) {
            try {
                await fetch(`${RENDER_API}/api/secure-log`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action, details, auth: 'CEO_DASHBOARD' })
                });
            } catch (e) { console.log("Sync..."); }
        }

        function copyLink() {
            const input = document.getElementById("current-url");
            navigator.clipboard.writeText(input.value);
            syncCuisine('copy_link', input.value);
            alert("Lien copié.");
        }

        // Initialisation par défaut
        document.getElementById('current-url').value = window.location.origin + "/target.html?p=selection";
    </script>
</body>
</html>
