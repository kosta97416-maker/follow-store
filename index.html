<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — RENDER MONOLITH</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; }
        .header { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--border); border-bottom: 1px solid var(--border); }
        .stat-card { background: var(--bg); padding: 20px; text-align: center; border-right: 1px solid var(--border); }
        .val { font-size: 22px; font-weight: bold; color: var(--neon); display: block; }
        .lbl { font-size: 9px; color: #555; margin-top: 5px; text-transform: uppercase; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; height: calc(100vh - 85px); }
        .module { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .title { font-size: 10px; color: var(--neon); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        textarea { flex: 1; background: #000; border: 1px solid #222; color: #fff; padding: 15px; font-family: 'Space Mono'; font-size: 11px; margin-bottom: 15px; resize: none; outline: none; }
        .btn { padding: 20px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: none; text-transform: uppercase; font-weight: bold; }
        .btn-main { background: var(--neon); color: #000; }
        .btn-dark { background: #111; color: #fff; border: 1px solid #222; margin-top: 10px; }
        .url-box { background: #000; border: 1px solid #222; padding: 15px; color: var(--neon); font-size: 11px; margin-bottom: 15px; min-height: 55px; word-break: break-all; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 40px; }
        .grid-inv { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .col-inv { background: var(--panel); border: 1px solid var(--border); padding: 15px; height: 70vh; overflow-y: auto; }
        .prod { background: #000; border: 1px solid #222; padding: 12px; margin-bottom: 10px; cursor: pointer; font-size: 10px; }
        .close { position: absolute; top: 20px; right: 20px; color: #ff4444; border: 1px solid #ff4444; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="stat-card"><span class="val" id="st-shop">1250.00€</span><span class="lbl">SHOPIFY LIVE</span></div>
        <div class="stat-card"><span class="val" id="st-amz">450.00€</span><span class="lbl">AMAZON LIVE</span></div>
        <div class="stat-card"><span class="val" id="st-ai">85.00€</span><span class="lbl">AI_AGENT LIVE</span></div>
    </div>

    <div class="dashboard">
        <div class="module">
            <div class="title">ORDRE_TACTIQUE (CODE HTML)</div>
            <textarea id="order-input" placeholder="Collez le code HTML ici..."></textarea>
            <button class="btn btn-main" onclick="sendToCuisine()">DÉPLOYER L'ORDRE</button>
        </div>
        <div class="module">
            <div class="title">MUNITION_ACTUELLE</div>
            <div class="url-box" id="url-display">SÉLECTIONNEZ UN PRODUIT</div>
            <button class="btn btn-main" style="background:#fff" onclick="copyMunition()">COPIER MUNITION</button>
            <button class="btn btn-dark" onclick="toggleInv(true)">📦 INVENTAIRE</button>
        </div>
    </div>

    <div id="overlay">
        <div class="close" onclick="toggleInv(false)">[ FERMER ]</div>
        <div class="grid-inv">
            <div class="col-inv"><div class="title">💧 EAU</div><div class="prod" onclick="setProd('eau')">UNITÉ_FILTRE_V1</div></div>
            <div class="col-inv"><div class="title">⚡ ÉNERGIE</div><div class="prod" onclick="setProd('energie')">SOLAIRE_V1</div></div>
            <div class="col-inv"><div class="title">🧘 SOIN</div><div class="prod" onclick="setProd('soin')">BIO_V1</div></div>
            <div class="col-inv"><div class="title">🎒 SURVIE</div><div class="prod" onclick="setProd('survie')">KIT_72H</div></div>
        </div>
    </div>

    <script>
        // Automatique : on utilise l'URL actuelle du navigateur
        const API = window.location.origin;

        function toggleInv(show) { document.getElementById('overlay').style.display = show ? 'block' : 'none'; }
        function setProd(p) { document.getElementById('url-display').innerText = API + "/target.html?p=" + p; toggleInv(false); }
        async function copyMunition() { await navigator.clipboard.writeText(document.getElementById('url-display').innerText); alert("Copié."); }

        async function sendToCuisine() {
            const code = document.getElementById('order-input').value;
            const encoded = btoa(encodeURIComponent(code));
            try {
                const res = await fetch(`${API}/api/deploy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order: encoded, auth: "CEO_FOLLOW" })
                });
                if(res.ok) alert("ORDRE TRANSMIS.");
            } catch (e) { alert("ERREUR."); }
        }
    </script>
</body>
</html>
