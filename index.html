<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW TREND | EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
    </style>
</head>
<body>
    <div class="text-center py-10 border-b border-zinc-900">
        <h1 class="text-4xl font-black gold tracking-tighter">FOLLOW TREND</h1>
        <p class="text-zinc-500 text-xs uppercase tracking-widest mt-2">Infrastructure v10.5 | Agents Active</p>
    </div>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 p-10">
        <div id="status" class="col-span-full text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-gold mb-4"></div>
            <p class="gold animate-pulse text-sm uppercase">L'agent Hunter déploie le catalogue AliExpress...</p>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const r = await fetch('/?action=search');
                const d = await r.json();
                const g = document.getElementById('grid');
                if(d.products && d.products.length > 0) {
                    g.innerHTML = d.products.map(p => `
                        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl overflow-hidden hover:gold-border transition-all duration-300">
                            <img src="${p.image}" class="w-full h-56 object-cover">
                            <div class="p-5">
                                <h3 class="text-[12px] text-zinc-400 h-10 overflow-hidden mb-4">${p.name}</h3>
                                <div class="flex justify-between items-center">
                                    <span class="text-xl font-bold">${p.price}€</span>
                                    <a href="${p.link}" target="_blank" class="gold-bg text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">Commander</a>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {
                document.getElementById('status').innerHTML = "<p class='text-red-500'>Erreur de liaison agents.</p>";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
