<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FOLLOW. — Bureau CEO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#03030a;--surface:#08080f;--card:#0d0d18;--border:#141428;
  --accent:#C8FF00;--gold:#FFD700;--red:#FF4444;--blue:#00D4FF;--green:#00FF88;
  --text:#eeeef8;--muted:#3a3a5a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

.nav-admin { background:#000; padding:10px 24px; display:flex; gap:12px; border-bottom:1px solid #222; position: sticky; top:0; z-index: 2000; }
.nav-admin a { color:var(--accent); font-size:11px; text-decoration:none; border:1px solid var(--accent); padding:6px 12px; border-radius:6px; font-weight: bold; text-transform: uppercase; }

.lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.lock-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:8px;}
.lock-logo span{color:var(--accent)}
.lock-input{background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:14px 20px;font-family:'DM Mono',monospace;font-size:18px;text-align:center;letter-spacing:8px;width:220px;outline:none}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;}
.header-logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px}

main{max-width:1200px;margin:0 auto;padding:32px 24px}
.hero-balance{background:linear-gradient(135deg,var(--card),#080812);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:24px; text-align:center;}
.balance-amount{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--accent);line-height:1}

.grid-stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; position:relative;}
.stat-title { font-size:10px; letter-spacing:2px; color:var(--muted); font-weight:700; margin-bottom:10px; text-transform:uppercase;}
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:32px; }

.btn-update { background:var(--accent); color:#000; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px; font-size:11px;}
.btn-withdraw { background:var(--gold); color:#000; border:none; padding:15px 30px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:20px; font-size:14px; letter-spacing:1px;}

.transfer-status { margin-top:20px; padding:15px; background:rgba(255,215,0,0.05); border:1px dashed var(--gold); border-radius:12px; display:none;}
</style>
</head>
<body>

<div class="nav-admin">
    <a href="index.html">🚀 ACCÈS AGENTS</a>
    <a href="target.html?p=eau" target="_blank">👁️ VOIR PAGE VENTE</a>
</div>

<div class="lock" id="lock">
  <div class="lock-logo">FOLLOW<span>.</span></div>
  <input class="lock-input" id="lock-input" type="password" placeholder="••••" maxlength="4"/>
  <button onclick="unlock()" style="background:var(--accent); border:none; padding:10px 40px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">ENTRER</button>
</div>

<header id="app" style="display:none">
  <div class="header-logo-text">FOLLOW<span>.</span> CEO</div>
  <div id="live-date" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)"></div>
</header>

<main id="main-app" style="display:none">
  <div class="hero-balance">
    <div class="stat-title">CAPITAL TOTAL AGENCE</div>
    <div class="balance-amount" id="total-capital">0,00 €</div>
    
    <div class="transfer-status" id="transfer-box">
        <div style="color:var(--gold); font-size:11px; font-weight:bold;">💸 VIREMENT EN COURS VERS VOTRE COMPTE :</div>
        <div id="transfer-amount" style="font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--text)">0,00 €</div>
        <div style="font-size:9px; color:var(--muted); margin-top:5px;">STATUT : VALIDATION BANCAIRE EN COURS...</div>
    </div>

    <button class="btn-withdraw" onclick="makeWithdrawal()">🚀 EFFECTUER UN RETRAIT CEO</button>
  </div>

  <div class="grid-stats">
    <div class="stat-card">
        <div class="stat-title">📦 SHOPIFY / STRIPE</div>
        <div class="stat-value" id="val-shopify" style="color:var(--green)">0,00 €</div>
        <button class="btn-update" onclick="updateVal('shopify')">SAISIR GAINS</button>
    </div>
    <div class="stat-card">
        <div class="stat-title">🛒 AMAZON PARTENAIRES</div>
        <div class="stat-value" id="val-amazon" style="color:var(--blue)">0,00 €</div>
        <button class="btn-update" onclick="updateVal('amazon')">SAISIR GAINS</button>
    </div>
    <div class="stat-card">
        <div class="stat-title">🤖 AFFILIATION OUTILS IA</div>
        <div class="stat-value" id="val-ia" style="color:var(--gold)">0,00 €</div>
        <button class="btn-update" onclick="updateVal('ia')">SAISIR GAINS</button>
    </div>
  </div>
</main>

<script>
const PIN = '1234';
let data = { shopify: 0, amazon: 0, ia: 0, inTransfer: 0 };

function unlock() {
    if(document.getElementById('lock-input').value === PIN) {
        document.getElementById('lock').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('main-app').style.display = 'block';
        refresh();
    }
}

function updateVal(type) {
    let newVal = prompt("Montant des nouveaux gains pour " + type + " (€) :");
    if (newVal != null && !isNaN(newVal)) {
        data[type] += parseFloat(newVal);
        refresh();
    }
}

function makeWithdrawal() {
    let total = data.shopify + data.amazon + data.ia;
    let amount = prompt("Quel montant voulez-vous envoyer sur votre compte personnel ? (Max: " + total + " €)");
    
    if (amount != null && !isNaN(amount)) {
        let val = parseFloat(amount);
        if (val <= total) {
            // On déduit proportionnellement des sources ou simplement du total
            // Pour faire simple, on retire du total affiché
            data.inTransfer = val;
            
            // Simulation de déduction du capital (on vide le shopify en priorité pour l'exemple)
            if(data.shopify >= val) { data.shopify -= val; } 
            else { data.ia -= val; } // etc.
            
            refresh();
            document.getElementById('transfer-box').style.display = 'block';
        } else {
            alert("Fonds insuffisants dans le capital agence.");
        }
    }
}

function refresh() {
    document.getElementById('val-shopify').textContent = data.shopify.toLocaleString('fr-FR') + ' €';
    document.getElementById('val-amazon').textContent = data.amazon.toLocaleString('fr-FR') + ' €';
    document.getElementById('val-ia').textContent = data.ia.toLocaleString('fr-FR') + ' €';
    document.getElementById('transfer-amount').textContent = data.inTransfer.toLocaleString('fr-FR') + ' €';
    
    let total = data.shopify + data.amazon + data.ia;
    document.getElementById('total-capital').textContent = total.toLocaleString('fr-FR') + ' €';
}

setInterval(() => { document.getElementById('live-date').textContent = new Date().toLocaleString('fr-FR'); }, 1000);
</script>

</body>
</html>
