<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW. CEO — DASHBOARD & LIVE OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03030a; --card: #0d0d18; --accent: #C8FF00; --amazon: #FF9900; --ai: #00F0FF; --text: #fff; --border: #141428; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; }

        /* FINANCE SECTION */
        .grid-cash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .cash-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .bar-bg { background: #000; height: 10px; border-radius: 5px; margin: 15px 0; border: 1px solid #1a1a2e; }
        .bar-fill { height: 100%; border-radius: 5px; width: 0%; transition: 1.5s ease-out; }
        .btn-add { background: none; border: 1px solid #333; color: #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        /* EXTENSION LIVE OPS (SURVEILLANCE AGENTS) */
        .extension-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        .ext-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        .niche-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .niche-column { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #111; min-height: 200px; }
        .niche-header { font-size: 12px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; text-align: center; }
        
        .agent-pick { display: flex; align-items: center; gap: 10px; background: #0d0d18; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-size: 11px; border: 1px solid #1a1a2e; }
        .agent-pick img { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; }
        .tag-live { color: var(--accent); font-size: 9px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FOLLOW. <span style="color:var(--accent)">CEO</span></div>
        <div style="font-family:'DM Mono'; font-size:12px; color:#333;">CONTROL_PANEL_V4.2</div>
    </div>

    <div class="grid-cash">
        <div class="cash-card">
            <div style="font-size:10px; letter-spacing:2px; color:#555;">SHOPIFY</div>
            <div id="val-shop" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
            <div class="bar-bg"><div id="bar-shop" class="bar-fill" style="background:var(--accent)"></div></div>
            <button class="btn-add" onclick="updateCash('shop')">ACTUALISER</button>
        </div>
        <div class="cash-card">
            <div style="font-size:10px; letter-spacing:2px; color:#555;">AMAZON</div>
            <div id="val-ama" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
            <div class="bar-bg"><div id="bar-ama" class="bar-fill" style="background:var(--amazon)"></div></div>
            <button class="btn-add" onclick="updateCash('ama')">ACTUALISER</button>
        </div>
        <div class="cash-card">
            <div style="font-size:10px; letter-spacing:2px; color:#555;">IA SERVICES</div>
            <div id="val-ia" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
            <div class="bar-bg"><div id="bar-ia" class="bar-fill" style="background:var(--ai)"></div></div>
            <button class="btn-add" onclick="updateCash('ia')">ACTUALISER</button>
        </div>
    </div>

    <div class="extension-container">
        <div class="ext-title">
            <span>📡 EXTENSION : SURVEILLANCE PROSPECTION AGENTS</span>
            <span class="tag-live">● LIVE FEED</span>
        </div>

        <div class="niche-grid">
            <div class="niche-column">
                <div class="niche-header" style="color:#00F0FF">💧 EAU</div>
                <div id="feed-eau">
                    <div class="agent-pick">
                        <img src="https://via.placeholder.com/50" id="img-eau">
                        <div><b id="title-eau">En attente...</b><br><span style="color:#555">Dernier scan</span></div>
                    </div>
                </div>
            </div>

            <div class="niche-column">
                <div class="niche-header" style="color:#FFD700">⚡ ÉNERGIE</div>
                <div id="feed-energie">
                    <div class="agent-pick">
                        <img src="https://via.placeholder.com/50" id="img-energie">
                        <div><b id="title-energie">En attente...</b><br><span style="color:#555">Dernier scan</span></div>
                    </div>
                </div>
            </div>

            <div class="niche-column">
                <div class="niche-header" style="color:#ff4444">💊 SOIN</div>
                <div id="feed-soin">
                    <div class="agent-pick">
                        <img src="https://via.placeholder.com/50" id="img-soin">
                        <div><b id="title-soin">En attente...</b><br><span style="color:#555">Dernier scan</span></div>
                    </div>
                </div>
            </div>

            <div class="niche-column">
                <div class="niche-header" style="color:var(--accent)">🎒 SURVIE</div>
                <div id="feed-survie">
                    <div class="agent-pick">
                        <img src="https://via.placeholder.com/50" id="img-survie">
                        <div><b id="title-survie">En attente...</b><br><span style="color:#555">Dernier scan</span></div>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn-add" style="width:100%; margin-top:20px; padding:10px;" onclick="fetchLivePicks()">RAFRAÎCHIR LA SURVEILLANCE</button>
    </div>

    <script>
        let finances = { shop: 0, ama: 0, ia: 0, goal: 10000 };
        const SHOP_URL = localStorage.getItem('ceo_shop_url') || "ton-shop.myshopify.com";

        function updateCash(key) {
            let val = prompt("Nouveau gain (€) :");
            if(val) {
                finances[key] += parseFloat(val);
                document.getElementById('val-'+key).innerText = finances[key].toLocaleString() + " €";
                document.getElementById('bar-'+key).style.width = Math.min((finances[key]/finances.goal)*100, 100) + "%";
            }
        }

        async function fetchLivePicks() {
            try {
                const res = await fetch(`https://${SHOP_URL}/products.json`);
                const data = await res.json();
                
                const findAndSet = (keywords, elementId, imgId) => {
                    const found = data.products.find(p => keywords.some(k => p.title.toLowerCase().includes(k)));
                    if(found) {
                        document.getElementById(elementId).innerText = found.title.substring(0, 20) + "...";
                        document.getElementById(imgId).src = found.images[0].src;
                    }
                };

                findAndSet(["filtre", "gourde", "water"], "title-eau", "img-eau");
                findAndSet(["solaire", "panneau", "solar", "flashlight"], "title-energie", "img-energie");
                findAndSet(["trousse", "medical", "bandage", "soin"], "title-soin", "img-soin");
                findAndSet(["couteau", "survival", "hache"], "title-survie", "img-survie");

            } catch(e) { console.log("Erreur de synchro"); }
        }

        // Auto-refresh toutes les 30 sec
        setInterval(fetchLivePicks, 30000);
        window.onload = fetchLivePicks;
    </script>
</body>
</html>
