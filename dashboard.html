<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW. CEO — SECURE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03030a; --card: #0d0d18; --accent: #C8FF00; --amazon: #FF9900; --ai: #00F0FF; --text: #fff; --border: #141428; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        
        /* ÉCRAN DE VERROUILLAGE */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .lock-logo { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; }
        .pin-input { background: #000; border: 2px solid var(--border); border-radius: 10px; color: var(--accent); padding: 15px; font-family: 'DM Mono', monospace; font-size: 30px; text-align: center; width: 150px; outline: none; transition: 0.3s; }
        .pin-input:focus { border-color: var(--accent); }
        .btn-unlock { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD (MASQUÉ AU DÉBUT) */
        #main-dashboard { display: none; padding: 20px; }
        
        /* STYLE DU DASHBOARD (Ce que je t'ai donné avant) */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; }
        .grid-cash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .cash-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .bar-bg { background: #000; height: 10px; border-radius: 5px; margin: 15px 0; border: 1px solid #1a1a2e; }
        .bar-fill { height: 100%; border-radius: 5px; width: 0%; transition: 1.5s ease-out; }
        .extension-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; border-top: 4px solid var(--accent); }
        .niche-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .niche-column { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #111; min-height: 180px; }
        .agent-pick { display: flex; align-items: center; gap: 10px; background: #0d0d18; padding: 10px; border-radius: 8px; font-size: 11px; }
        .agent-pick img { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-logo">FOLLOW<span style="color:var(--accent)">.</span> CEO</div>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="****">
        <button class="btn-unlock" onclick="checkPin()">ACCÉDER AU SYSTÈME</button>
    </div>

    <div id="main-dashboard">
        <div class="header">
            <div class="logo">FOLLOW. <span style="color:var(--accent)">CEO</span></div>
            <div id="clock" style="font-family:'DM Mono'; font-size:12px; color:#333;">00:00:00</div>
        </div>

        <div class="grid-cash">
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">SHOPIFY REVENUES</div>
                <div id="val-shop" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-shop" class="bar-fill" style="background:var(--accent)"></div></div>
                <button onclick="updateCash('shop')">Actualiser</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">AMAZON AFFILIATE</div>
                <div id="val-ama" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-ama" class="bar-fill" style="background:var(--amazon)"></div></div>
                <button onclick="updateCash('ama')">Actualiser</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">IA SERVICES</div>
                <div id="val-ia" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-ia" class="bar-fill" style="background:var(--ai)"></div></div>
                <button onclick="updateCash('ia')">Actualiser</button>
            </div>
        </div>

        <div class="extension-container">
            <div style="font-family: 'Bebas Neue'; font-size: 20px; color: var(--accent); margin-bottom: 20px;">📡 EXTENSION : LIVE PROSPECTION AGENTS</div>
            <div class="niche-grid">
                <div class="niche-column"><div style="color:#00F0FF; font-size:10px; margin-bottom:10px;">💧 EAU</div><div class="agent-pick"><img src="" id="img-eau"><div><span id="title-eau">Scan...</span></div></div></div>
                <div class="niche-column"><div style="color:#FFD700; font-size:10px; margin-bottom:10px;">⚡ ÉNERGIE</div><div class="agent-pick"><img src="" id="img-energie"><div><span id="title-energie">Scan...</span></div></div></div>
                <div class="niche-column"><div style="color:#ff4444; font-size:10px; margin-bottom:10px;">💊 SOIN</div><div class="agent-pick"><img src="" id="img-soin"><div><span id="title-soin">Scan...</span></div></div></div>
                <div class="niche-column"><div style="color:var(--accent); font-size:10px; margin-bottom:10px;">🎒 SURVIE</div><div class="agent-pick"><img src="" id="img-survie"><div><span id="title-survie">Scan...</span></div></div></div>
            </div>
            <button style="width:100%; margin-top:15px; cursor:pointer;" onclick="fetchLivePicks()">Synchroniser Live Ops</button>
        </div>
    </div>

    <script>
        // LE CODE QUE TU DOIS RENTRER
        const SECRET_PIN = "9741"; 

        function checkPin() {
            const input = document.getElementById('pin-code').value;
            if(input === SECRET_PIN) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                fetchLivePicks(); // Lance le scan une fois déverrouillé
            } else {
                alert("CODE INCORRECT. ACCÈS REFUSÉ.");
                document.getElementById('pin-code').value = "";
            }
        }

        // --- RESTE DU SYSTÈME (CASH ET LIVE OPS) ---
        let finances = { shop: 0, ama: 0, ia: 0, goal: 10000 };
        const SHOP_URL = localStorage.getItem('ceo_shop_url') || "ton-shop.myshopify.com";

        function updateCash(key) {
            let val = prompt("Montant du gain (€) :");
            if(val) {
                finances[key] += parseFloat(val);
                document.getElementById('val-'+key).innerText = finances[key].toLocaleString() + " €";
                document.getElementById('bar-'+key).style.width = Math.min((finances[key]/finances.goal)*100, 100) + "%";
            }
        }

        async function fetchLivePicks() {
            try {
                const res = await fetch(`https://${SHOP_URL}/products.json`);
                const data = await res.json();
                const setNiche = (keywords, titleId, imgId) => {
                    const found = data.products.find(p => keywords.some(k => p.title.toLowerCase().includes(k)));
                    if(found) {
                        document.getElementById(titleId).innerText = found.title.substring(0, 15) + "..";
                        document.getElementById(imgId).src = found.images[0].src;
                    }
                };
                setNiche(["filtre", "gourde", "water"], "title-eau", "img-eau");
                setNiche(["solaire", "panneau", "solar"], "title-energie", "img-energie");
                setNiche(["trousse", "soin", "medical"], "title-soin", "img-soin");
                setNiche(["couteau", "survival", "hache"], "title-survie", "img-survie");
            } catch(e) {}
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
