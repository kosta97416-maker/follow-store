<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard CEO - FollowTrend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        
        /* Tes boutons noirs de navigation en haut */
        .nav-header { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 30px; }
        .btn-black { background: black; color: white; border: 1px solid #444; padding: 10px 20px; cursor: pointer; text-decoration: none; border-radius: 5px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; max-width: 800px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-online { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="target.html?p=eau" target="_blank" class="btn-black">
            <i class="fas fa-eye"></i> VOIR LA PAGE
        </a>
    </div>

    <div class="card">
        <h1>TABLEAU DE BORD CEO</h1>
        <hr border="0" border-top="1px solid #444">
        
        <div style="text-align: left; margin-top: 20px;">
            <h3>🤖 État de l'Agence</h3>
            <p>Agent de Traduction : <span class="status-online">OPÉRATIONNEL</span></p>
            <p>Agent de Prix : <span class="status-online">ACTIF</span></p>
            <p>Base de données : <span style="color:orange;">CONNECTÉE</span></p>
        </div>
    </div>

    <script>
        // Ta sécurité par code PIN
        let pass = prompt("Code PIN de sécurité :");
        if (pass !== "9741") {
            alert("Accès refusé");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
