<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit - Qualité Militaire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f9f9f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; background: white; padding: 30px; border-radius: 10px; }
        .badge { background: #d4e3b5; color: #5d7a2a; padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 3px; display: inline-block; margin-bottom: 15px; }
        h1 { font-size: 24px; color: #444; text-transform: uppercase; line-height: 1.2; margin-bottom: 20px; }
        .image-placeholder { width: 100%; height: 250px; background: #eee; border-radius: 5px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: #aaa; }
        .price-container { margin-bottom: 25px; }
        .current-price { color: #e74c3c; font-size: 32px; font-weight: bold; margin-right: 10px; }
        .old-price { color: #aaa; text-decoration: line-through; font-size: 18px; }
        .features { list-style: none; padding: 0; margin-bottom: 30px; }
        .features li { margin-bottom: 12px; display: flex; align-items: center; font-size: 15px; color: #555; }
        .features i { color: #27ae60; margin-right: 10px; font-size: 18px; }
        .btn-buy { background: #333; color: white; text-decoration: none; display: block; text-align: center; padding: 18px; border-radius: 40px; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .stock-warn { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">QUALITÉ MILITAIRE</div>
        <h1 id="title">CHARGEMENT...</h1>

        <div class="image-placeholder">
             <i class="fas fa-tint" style="font-size: 50px; color: #3498db;"></i>
        </div>

        <div class="price-container">
            <span class="current-price" id="price">--</span>
            <span class="old-price" id="old-price">--</span>
        </div>

        <ul class="features">
            <li><i class="fas fa-check-circle"></i> Filtre 99.99% des bactéries</li>
            <li><i class="fas fa-check-circle"></i> Ultra-léger (65g)</li>
            <li><i class="fas fa-check-circle"></i> Utilisé par les forces spéciales</li>
            <li><i class="fas fa-check-circle"></i> Durée de vie : 4000 Litres</li>
        </ul>

        <a href="#" id="buy-link" class="btn-buy">COMMANDER MAINTENANT</a>
        <p class="stock-warn">🔥 Plus que 7 articles en stock</p>
    </div>

    <script>
        const products = {
            'eau': {
                title: "SYSTÈME DE FILTRATION PURIFICATION NOMADE",
                price: "49.90 €",
                oldPrice: "89.00 €",
                link: "https://ton-lien-paiement-eau.com"
            },
            'survie': {
                title: "KIT DE SURVIE PROFESSIONNEL COMPLET",
                price: "89.90 €",
                oldPrice: "149.00 €",
                link: "https://ton-lien-paiement-survie.com"
            }
        };

        function setupPage() {
            const params = new URLSearchParams(window.location.search);
            const pId = params.get('p') || 'eau';
            const p = products[pId];

            if(p) {
                document.getElementById('title').innerText = p.title;
                document.getElementById('price').innerText = p.price;
                document.getElementById('old-price').innerText = p.oldPrice;
                document.getElementById('buy-link').href = p.link;
            }
        }
        setupPage();
    </script>
</body>
</html>
