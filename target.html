<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFRE EXCLUSIVE — FOLLOW.SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C8FF00; --bg: #fff; --text: #000; --dim: #f4f4f4; --red: #e60000; }
        body { margin: 0; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); line-height: 1.5; }
        
        /* BANDEAU URGENCE */
        .promo-bar { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        
        header { padding: 20px; display: flex; justify-content: center; border-bottom: 1px solid var(--dim); position: sticky; top: 0; background: #fff; z-index: 10; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; }
        .logo span { color: var(--accent); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .product-tag { background: var(--accent); color: #000; display: inline-block; padding: 5px 12px; font-size: 11px; font-weight: 900; border-radius: 4px; margin-bottom: 15px; }
        
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 0.9; margin-bottom: 15px; text-transform: uppercase; }
        
        .product-image { width: 100%; border-radius: 20px; background: var(--dim); height: 350px; display: flex; align-items: center; justify-content: center; font-size: 80px; margin-bottom: 25px; border: 1px solid #eee; box-shadow: inset 0 0 50px rgba(0,0,0,0.05); }

        .price-box { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .current-price { font-size: 38px; font-weight: 800; color: var(--red); }
        .old-price { font-size: 20px; text-decoration: line-through; color: #aaa; }

        .features { list-style: none; padding: 0; margin-bottom: 30px; }
        .features li { padding: 12px 0; border-bottom: 1px solid var(--dim); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
        .features li::before { content: "✓"; color: #fff; background: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }

        .cta-button { background: #000; color: #fff; text-decoration: none; display: block; text-align: center; padding: 22px; border-radius: 50px; font-weight: bold; font-size: 20px; transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.15); text-transform: uppercase; letter-spacing: 1px; }
        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .urgency-text { text-align: center; color: var(--red); font-size: 13px; font-weight: bold; margin-top: 20px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="promo-bar" id="top-bar">Stock limité : Plus que 7 unités disponibles</div>

    <header>
        <div class="logo">FOLLOW<span>.</span>SHOP</div>
    </header>

    <div class="container">
        <div id="product-content">
            <div class="product-tag" id="tag">CHARGEMENT...</div>
            <h1 id="title">CHARGEMENT DU PRODUIT...</h1>
            
            <div class="product-image" id="image">📦</div>

            <div class="price-box">
                <span class="current-price" id="price">-- €</span>
                <span class="old-price" id="old-price">-- €</span>
            </div>

            <ul class="features" id="features">
                </ul>

            <a href="#" class="cta-button" id="buy-link">VÉRIFIER LA DISPONIBILITÉ</a>
            <div class="urgency-text">🔥 Offre prioritaire pour les nouveaux clients</div>
        </div>
    </div>

    <script>
        // BASE DE DONNÉES LOCALE (Produits par défaut)
        const products = {
            'eau': {
                tag: 'QUALITÉ MILITAIRE',
                title: 'SYSTÈME DE FILTRATION PURIFICATION NOMADE',
                img: '💧',
                features: ['Filtre 99.99% des impuretés', 'Compact & Ultra-léger', 'Garanti sans produits chimiques', 'Utilisable en rivière et lac'],
                link: 'https://votre-boutique.com/eau'
            },
            'energie': {
                tag: 'AUTONOMIE TOTALE',
                title: 'CHARGEUR SOLAIRE TACTIQUE PLIABLE',
                img: '⚡',
                features: ['Charge rapide multi-appareils', 'Panneaux monocristallins', 'Indestructible & Étanche', 'Format poche dépliable'],
                link: 'https://votre-boutique.com/energie'
            },
            'soin': {
                tag: 'SANTÉ PHYSIQUE',
                title: 'CORRECTEUR DE POSTURE À MÉMOIRE DE FORME',
                img: '🧘',
                features: ['Soulagement immédiat du dos', 'Design invisible sous les habits', 'Recommandé par les kinés', 'Matière respirante premium'],
                link: 'https://votre-boutique.com/soin'
            },
            'survie': {
                tag: 'ÉQUIPEMENT CRITIQUE',
                title: 'PACK DE SURVIE PROFESSIONNEL - 72 HEURES',
                img: '🎒',
                features: ['Kit médical d\'urgence complet', 'Outils multifonctions acier', 'Système d\'allumage feu survie', 'Couvertures isolantes incluses'],
                link: 'https://votre-boutique.com/survie'
            }
        };

        // RÉCUPÉRATION DU PRODUIT DANS L'URL
        const params = new URLSearchParams(window.location.search);
        const pId = params.get('p') || 'survie';
        const p = products[pId];

        // RÉCUPÉRATION DES PRIX DEPUIS LE DASHBOARD (AGENT DE PRIX)
        const savedPrices = JSON.parse(localStorage.getItem('agencyPrices'));

        if(p) {
            document.title = p.title + " — FOLLOW.SHOP";
            document.getElementById('tag').innerText = p.tag;
            document.getElementById('title').innerText = p.title;
            document.getElementById('image').innerText = p.img;
            document.getElementById('buy-link').href = p.link;
            document.getElementById('features').innerHTML = p.features.map(f => `<li>${f}</li>`).join('');

            // Applique les prix du Dashboard ou les prix par défaut
            if(savedPrices && savedPrices[pId]) {
                document.getElementById('price').innerText = savedPrices[pId].p + " €";
                document.getElementById('old-price').innerText = savedPrices[pId].old + " €";
            } else {
                // Prix de secours si Dashboard non configuré
                document.getElementById('price').innerText = "49.00 €";
                document.getElementById('old-price').innerText = "89.00 €";
            }
        }
        
        // Bloquer le clic droit (Sécurité)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
